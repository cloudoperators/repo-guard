name: Nightly

on:
  schedule:
    # Run at 02:00 UTC every day
    - cron: '0 2 * * *'
  # Allow manual trigger for debugging
  workflow_dispatch:

concurrency:
  group: github-guard-greenhouse-nightly
  cancel-in-progress: false

jobs:
  controller-test-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Update test.env with real GitHub credentials
        env:
          TEST_GITHUB_PRIVATE_KEY: ${{ secrets.TEST_GITHUB_PRIVATE_KEY }}
        run: |
          sed -i 's/^GITHUB_TOKEN=.*/GITHUB_TOKEN=${{ secrets.TEST_GITHUB_TOKEN }}/' internal/controller/test.env
          sed -i 's/^GITHUB_CLIENT_ID=.*/GITHUB_CLIENT_ID=${{ secrets.TEST_GITHUB_CLIENT_ID }}/' internal/controller/test.env
          sed -i 's/^GITHUB_CLIENT_SECRET=.*/GITHUB_CLIENT_SECRET=${{ secrets.TEST_GITHUB_CLIENT_SECRET }}/' internal/controller/test.env

          echo "TEST_GITHUB_PRIVATE_KEY<<EOF" >> internal/controller/test.env
          echo "$TEST_GITHUB_PRIVATE_KEY" >> internal/controller/test.env
          echo "EOF" >> internal/controller/test.env
      - name: Run Controller Tests (live GitHub)
        # GITHUB_MOCK=false runs against the real greenhouse-sandbox GitHub org.
        # Requires TEST_GITHUB_TOKEN, TEST_GITHUB_CLIENT_ID, TEST_GITHUB_CLIENT_SECRET,
        # and TEST_GITHUB_PRIVATE_KEY secrets to be set in the repository.
        env:
          GITHUB_MOCK: "false"
          TEST_LDAP_GROUP_PROVIDER_HOST: "ldap://localhost:389"
          TEST_LDAP_GROUP_PROVIDER_BASE_DN: "DC=ad,DC=global"
          TEST_LDAP_GROUP_PROVIDER_BIND_DN: "CN=ldap-service,CN=Users,DC=ad,DC=global"
          TEST_LDAP_GROUP_PROVIDER_BIND_PW: randompassword
        run: make controller-test-live

  e2e-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Setup E2E Prerequisites (k3d, kubectl, helm, jq)
        run: |
          # Install k3d
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

          # Install Helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          # kubectl, helm, and jq should now be in /usr/local/bin
          kubectl version --client
          helm version
          jq --version

          echo "/usr/local/bin" >> $GITHUB_PATH
      - name: Update test.env with real GitHub credentials
        env:
          TEST_GITHUB_PRIVATE_KEY: ${{ secrets.TEST_GITHUB_PRIVATE_KEY }}
        run: |
          sed -i 's/^GITHUB_TOKEN=.*/GITHUB_TOKEN=${{ secrets.TEST_GITHUB_TOKEN }}/' internal/controller/test.env
          sed -i 's/^GITHUB_CLIENT_ID=.*/GITHUB_CLIENT_ID=${{ secrets.TEST_GITHUB_CLIENT_ID }}/' internal/controller/test.env
          sed -i 's/^GITHUB_CLIENT_SECRET=.*/GITHUB_CLIENT_SECRET=${{ secrets.TEST_GITHUB_CLIENT_SECRET }}/' internal/controller/test.env

          echo "TEST_GITHUB_PRIVATE_KEY<<EOF" >> internal/controller/test.env
          echo "$TEST_GITHUB_PRIVATE_KEY" >> internal/controller/test.env
          echo "EOF" >> internal/controller/test.env
      - name: Run E2E Tests (live GitHub)
        # USE_MOCK_GITHUB=false connects to the real greenhouse-sandbox GitHub org.
        # Requires GitHub App secrets and a PAT with org admin permissions.
        env:
          USE_MOCK_GITHUB: "false"
        run: |
          make e2e-live
      - name: Cleanup E2E (GitHub teams/repos + cluster)
        if: always()
        env:
          E2E_DRY_RUN: "false"
          E2E_CLEANUP_REPOS: "true"
          E2E_REPO_PREFIX: "e2e-"
        run: make e2e-down e2e-github-cleanup
