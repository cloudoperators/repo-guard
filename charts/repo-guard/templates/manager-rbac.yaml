{{ if .Values.manager.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "repo-guard.fullname" . }}-manager-role
  labels:
  {{- include "repo-guard.labels" . | nindent 4 }}
rules:
  # Main repoguard resources with full CRUD-ish verbs
  - apiGroups:
      - repoguard.cloudoperators.dev
    resources:
      - githuborganizations
      - githubs
      - githubteams
      - ldapgroupproviders
      - clusterldapgroupproviders
      - githubaccountlinks
      - genericexternalmemberproviders
      - clustergenericexternalmemberproviders
      - staticmemberproviders
      - clusterstaticmemberproviders
    verbs:
      - get
      - list
      - patch
      - update
      - watch

  # Finalizers for those resources (update only)
  - apiGroups:
      - repoguard.cloudoperators.dev
    resources:
      - githuborganizations/finalizers
      - githubs/finalizers
      - githubteams/finalizers
      - ldapgroupproviders/finalizers
      - clusterldapgroupproviders/finalizers
      - genericexternalmemberproviders/finalizers
      - clustergenericexternalmemberproviders/finalizers
      - staticmemberproviders/finalizers
      - clusterstaticmemberproviders/finalizers
    verbs:
      - update

  # Status subresources
  - apiGroups:
      - repoguard.cloudoperators.dev
    resources:
      - githuborganizations/status
      - githubs/status
      - githubteams/status
      - ldapgroupproviders/status
      - clusterldapgroupproviders/status
      - genericexternalmemberproviders/status
      - clustergenericexternalmemberproviders/status
      - staticmemberproviders/status
      - clusterstaticmemberproviders/status
    verbs:
      - get
      - patch
      - update

  # Read-only repoguard resources
  - apiGroups:
      - repoguard.cloudoperators.dev
    resources:
      - githubteamrepositories
      - githubusernames
    verbs:
      - get
      - list
      - watch

  # Core secrets
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch

  # Greenhouse teams
  - apiGroups:
      - greenhouse.sap
    resources:
      - teams
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "repo-guard.fullname" . }}-manager-rolebinding
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: repo-guard
    app.kubernetes.io/part-of: repo-guard
  {{- include "repo-guard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "repo-guard.fullname" . }}-manager-role'
subjects:
  - kind: ServiceAccount
    name: '{{ include "repo-guard.fullname" . }}-controller-manager'
    namespace: '{{ .Release.Namespace }}'
{{ end }}
