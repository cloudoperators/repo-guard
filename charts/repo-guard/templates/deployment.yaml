{{- if and .Values.manager.enabled (gt (int .Values.manager.replicas) 1) (not .Values.manager.leaderElection) }}
  {{- fail "manager.leaderElection must be true when manager.replicas > 1 to prevent split-brain" }}
{{- end }}
{{ if .Values.manager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "repo-guard.fullname" . }}-controller-manager
  labels:
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: repo-guard
    app.kubernetes.io/part-of: repo-guard
    control-plane: controller-manager
  {{- include "repo-guard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
    {{- include "repo-guard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        control-plane: controller-manager
      {{- include "repo-guard.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - command:
        - /manager
        args:
        - --metrics-bind-address=:9443
        - --health-probe-bind-address=:8082
        {{- if .Values.manager.leaderElection }}
        - --leader-elect
        - --leader-election-id={{ include "repo-guard.fullname" . }}
        {{- end }}
        # - --namespace
        # - "$(NAMESPACE)"
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: {{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag | default .Chart.AppVersion }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
        ports:
        - name: metrics
          containerPort: 9443
          protocol: TCP
        resources: {{- toYaml .Values.manager.resources | nindent 10
          }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      {{- if .Values.manager.leaderElection }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  control-plane: controller-manager
                  {{- include "repo-guard.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      serviceAccountName: {{ include "repo-guard.fullname" . }}-controller-manager
      terminationGracePeriodSeconds: 10
{{ end }}
