{{- range $org := .Values.githubOrganizations }}
  {{- if $org.teams }}
    {{- range $tidx, $team := $org.teams }}
apiVersion: repo-guard.cloudoperators.dev/v1
kind: GithubTeam
metadata:
  name: {{ $org.github }}--{{ $org.organization | replace "/" "-" | lower }}--{{ $team.name | replace "_" "-" | replace " " "-" | lower }}
  labels:
    repo-guard.cloudoperators.dev/addUser: "{{ $team.addUsers | default "true" }}"
    repo-guard.cloudoperators.dev/removeUser: "{{ $team.removeUsers | default "true" }}"
    {{- $ttl := (get $org "ttl") -}}
    {{- if not (kindIs "map" $ttl) }}{{- $ttl = dict -}}{{- end }}
    repo-guard.cloudoperators.dev/failedTTL: "{{ ((get $ttl "failed") | default $.Values.ttl.team.failed) }}"
    repo-guard.cloudoperators.dev/notfoundTTL: "{{ ((get $ttl "notfound") | default $.Values.ttl.team.notfound) }}"
    repo-guard.cloudoperators.dev/skippedTTL: "{{ ((get $ttl "skipped") | default $.Values.ttl.team.skipped) }}"
    repo-guard.cloudoperators.dev/completedTTL: "{{ ((get $ttl "completed") | default $.Values.ttl.team.completed) }}"
    {{- /* allow team-level override for disableInternalUsernames; fallback to org-level */ -}}
    {{- $teamDisable := false -}}
    {{- if hasKey $team "disableInternalUsernames" -}}
      {{- $teamDisable = $team.disableInternalUsernames -}}
    {{- else -}}
      {{- $teamDisable = ($org.disableInternalUsernames | default false) -}}
    {{- end -}}
    {{- $disStr := printf "%v" $teamDisable -}}
    {{- if eq $disStr "true" }}
    repo-guard.cloudoperators.dev/disableInternalUsernames: "true"
    {{- end }}
    {{- /* New: if org defines a required domain, set domain-valued label on all teams */ -}}
    {{- if and $org.githubAccountLinkEmailCheck $org.githubAccountLinkEmailCheck.domain }}
    repo-guard.cloudoperators.dev/require-verified-domain-email: {{ $org.githubAccountLinkEmailCheck.domain | quote }}
    {{- end }}
spec:
  {{- if or $team.ldapGroup $team.ldap $team.genericHTTP $team.static }}
  externalMemberProvider:
    {{- if $team.ldapGroup }}
    ldapGroup:
      ldapGroupProvider: "{{ if $.Values.ldaps }}{{ (index $.Values.ldaps 0).name | default "ldap" }}{{ else }}ldap{{ end }}"
      group: {{ $team.ldapGroup }}
    {{- end }}
    {{- if $team.ldap }}
    ldap:
      provider: "{{ if $team.ldap.provider }}{{ $team.ldap.provider }}{{ else if $.Values.ldaps }}{{ (index $.Values.ldaps 0).name | default "ldap" }}{{ else }}ldap{{ end }}"
      {{- $ldapProviderName := "" -}}
      {{- if $team.ldap.provider -}}
        {{- $ldapProviderName = $team.ldap.provider -}}
      {{- else if $.Values.ldaps -}}
        {{- $ldapProviderName = (index $.Values.ldaps 0).name | default "ldap" -}}
      {{- else -}}
        {{- $ldapProviderName = "ldap" -}}
      {{- end -}}
      {{- $kind := "" -}}
      {{- if $team.ldap.kind -}}
        {{- $kind = $team.ldap.kind -}}
      {{- else -}}
        {{- range $.Values.ldaps -}}
          {{- if eq .name $ldapProviderName -}}
            {{- if .clusterScoped -}}
              {{- $kind = "ClusterLDAPGroupProvider" -}}
            {{- else -}}
              {{- $kind = "LDAPGroupProvider" -}}
            {{- end -}}
          {{- end -}}
        {{- end -}}
      {{- end -}}
      {{- if $kind }}
      kind: {{ $kind }}
      {{- end }}
      group: {{ $team.ldap.group }}
    {{- end }}
    {{- if $team.genericHTTP }}
    genericHTTP:
      provider: {{ $team.genericHTTP.provider }}
      {{- $kind := "" -}}
      {{- if $team.genericHTTP.kind -}}
        {{- $kind = $team.genericHTTP.kind -}}
      {{- else -}}
        {{- range $.Values.genericExternalMemberProviders -}}
          {{- if eq .name $team.genericHTTP.provider -}}
            {{- if .clusterScoped -}}
              {{- $kind = "ClusterGenericExternalMemberProvider" -}}
            {{- else -}}
              {{- $kind = "GenericExternalMemberProvider" -}}
            {{- end -}}
          {{- end -}}
        {{- end -}}
      {{- end -}}
      {{- if $kind }}
      kind: {{ $kind }}
      {{- end }}
      group: {{ $team.genericHTTP.group }}
    {{- end }}
    {{- if $team.static }}
    static:
      provider: {{ $team.static.provider }}
      {{- $kind := "" -}}
      {{- if $team.static.kind -}}
        {{- $kind = $team.static.kind -}}
      {{- else -}}
        {{- range $.Values.staticMemberProviders -}}
          {{- if eq .name $team.static.provider -}}
            {{- if .clusterScoped -}}
              {{- $kind = "ClusterStaticMemberProvider" -}}
            {{- else -}}
              {{- $kind = "StaticMemberProvider" -}}
            {{- end -}}
          {{- end -}}
        {{- end -}}
      {{- end -}}
      {{- if $kind }}
      kind: {{ $kind }}
      {{- end }}
      group: {{ $team.static.group }}
    {{- end }}
  {{- end }}
  github: {{ $org.github }}
  organization: {{ $org.organization }}
  team: {{ $team.name }}
  {{- if $team.greenhouseTeam }}
  greenhouseTeam: {{ $team.greenhouseTeam }}
  {{- end }}
---
    {{- end }}
  {{- end }}
{{- end }}
