{{- range $org := .Values.githubOrganizations }}
apiVersion: repoguard.cloudoperators.dev/v1
kind: GithubOrganization
metadata:
  name: {{ $org.github }}--{{ $org.organization | replace "/" "-" | lower }}
  labels:
    repoguard.cloudoperators.dev/addTeam: "{{ $org.addTeam | default "true" }}"
    repoguard.cloudoperators.dev/removeTeam: "{{ $org.removeTeam | default "true" }}"
    repoguard.cloudoperators.dev/addOrganizationOwner: "{{ $org.addOrganizationOwner | default "true" }}"
    repoguard.cloudoperators.dev/removeOrganizationOwner: "{{ $org.removeOrganizationOwner | default "true" }}"
    repoguard.cloudoperators.dev/addRepositoryTeam: "{{ $org.addRepositoryTeam | default "true" }}"
    repoguard.cloudoperators.dev/removeRepositoryTeam: "{{ $org.removeRepositoryTeam | default "true" }}"
    repoguard.cloudoperators.dev/dryRun: "{{ $org.dryRun | default "false" }}"
    {{- $ttl := (get $org "ttl") -}}
    {{- if not (kindIs "map" $ttl) }}{{- $ttl = dict -}}{{- end }}
    repoguard.cloudoperators.dev/failedTTL: "{{ ((get $ttl "failed") | default $.Values.ttl.organization.failed) }}"
    repoguard.cloudoperators.dev/completedTTL: "{{ ((get $ttl "completed") | default $.Values.ttl.organization.completed) }}"
  {{- $skipTeams := join "," $org.skipDefaultRepositoryTeams }}
  {{- if $skipTeams }}
  annotations:
    repoguard.cloudoperators.dev/skipDefaultRepositoryTeams: "{{ $skipTeams }}"
  {{- end }}
spec:
  github: {{ $org.github }}
  organization: {{ $org.organization }}
  {{- if and $org.defaultPublicRepositoryTeams (gt (len $org.defaultPublicRepositoryTeams) 0) }}
  defaultPublicRepositoryTeams:
{{ toYaml $org.defaultPublicRepositoryTeams | indent 4 }}
  {{- end }}
  {{- if and $org.defaultPrivateRepositoryTeams (gt (len $org.defaultPrivateRepositoryTeams) 0) }}
  defaultPrivateRepositoryTeams:
{{ toYaml $org.defaultPrivateRepositoryTeams | indent 4 }}
  {{- end }}
  {{- if and $org.organizationOwnerTeams (gt (len $org.organizationOwnerTeams) 0) }}
  organizationOwnerTeams:
{{ toYaml $org.organizationOwnerTeams | indent 4 }}
  {{- end }}
  installationID: {{ $org.installationID | int64 }}
---
{{- end }}
